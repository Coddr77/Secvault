<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<body>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="position-absolute top-0 start-50 translate-middle-x mt-3 z-3">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} shadow">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="container-fluid min-vh-100 d-flex flex-column align-items-center justify-content-center py-5">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Auto-hide flash messages
        setTimeout(() => {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                alert.style.transition = "opacity 0.5s ease";
                alert.style.opacity = "0";
                setTimeout(() => alert.remove(), 500);
            });
        }, 4000);
    </script>
